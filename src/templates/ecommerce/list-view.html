{% include "ecommerce/search.html" %}

{% include "ecommerce/messages.html" %}

<h1>
    Vista de Listado
</h1>

{% for product in products %}
    <div class="product">
        <h2>{{ product.title }}</h2>
        <p>Precio: ${{ product.price }}</p>
        <a href="{% url 'detail' product.id %}">Ver Detalles</a>
    </div>
{% endfor %}
